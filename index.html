<!DOCTYPE html>
<html lang="en">

<head>
  <title>Pokedex</title>
  <link rel="stylesheet" href="colors.css">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>

<body>
  <div class="main-body">
    <div class="side-bar">
      <ul class="actions">
        <li><button data-type="all" class="action active" style=--bg:var(--all)> All </button></li>
        <li><button data-type="normal" class="action" style=--bg:var(--normal)> Normal </button></li>
        <li><button data-type="fire" class="action" style=--bg:var(--fire)> Fire </button></li>
        <li><button data-type="water" class="action" style=--bg:var(--water)> Water </button></li>
        <li><button data-type="electric" class="action" style=--bg:var(--electric)> Electric </button></li>
        <li><button data-type="grass" class="action" style=--bg:var(--grass)> Grass </button></li>
        <li><button data-type="ice" class="action" style=--bg:var(--ice)> Ice </button></li>
        <li><button data-type="fighting" class="action" style=--bg:var(--fighting)> Fighting </button></li>
        <li><button data-type="poison" class="action" style=--bg:var(--poison)> Poison </button></li>
        <li><button data-type="ground" class="action" style=--bg:var(--ground)> Ground </button></li>
        <li><button data-type="flying" class="action" style=--bg:var(--flying)> Flying </button></li>
        <li><button data-type="psychic" class="action" style=--bg:var(--psychic)> Psychic </button></li>
        <li><button data-type="bug" class="action" style=--bg:var(--bug)> Bug </button></li>
        <li><button data-type="rock" class="action" style=--bg:var(--rock)> Rock </button></li>
        <li><button data-type="ghost" class="action" style=--bg:var(--ghost)> Ghost </button></li>
        <li><button data-type="dragon" class="action" style=--bg:var(--dragon)> Dragon </button></li>
        <li><button data-type="dark" class="action" style=--bg:var(--dark)> Dark </button></li>
        <li><button data-type="steel" class="action" style=--bg:var(--steel)> Steel </button></li>
        <li><button data-type="fairy" class="action" style=--bg:var(--fairy)> Fairy </button></li>
      </ul>

    </div>
    <div class="container-wrapper">

      <div class="search-bar">
        <form method="GET" action="">
          <input type="text" name="pokemon" placeholder="Search Pokémon..." />
        </form>
      </div>
      <div class="container">
      </div>
    </div>
  </div>
</body>

</html>
